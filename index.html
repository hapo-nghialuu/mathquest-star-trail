<!doctype html>
<!--
  MathQuest: Star Trail — entry point.
  Offline fallback for GSAP: copy gsap.min.js to public/ and swap the import map
  URL to "/gsap.min.js". The import map is the only network dependency at boot.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0a1f5c" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" />
    <title>MathQuest: Star Trail</title>
    <link rel="preload" as="image" href="assets/screens/01_adventure_map_screen.png" />
    <script type="importmap">
      {
        "imports": {
          "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/+esm"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
